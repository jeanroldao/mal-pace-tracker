<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAL Manga Pace Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1916;
    --muted: #7a786f;
    --green: #1a7a52;
    --green-bg: #e8f5ef;
    --red: #b84a2a;
    --red-bg: #faeae5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f;
      --surface: #1f1e17;
      --border: #2e2d25;
      --text: #f0ede6;
      --muted: #7a786f;
      --green: #4bc98a;
      --green-bg: #0d2e1e;
      --red: #e8725a;
      --red-bg: #2a150d;
    }
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
    padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }

  .header-left h1 { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 3px; }
  .header-left p { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
  }
  .pill label { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .pill input[type="number"] {
    width: 48px; border: none; background: transparent;
    font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text);
    text-align: center; outline: none; -moz-appearance: textfield;
  }
  .pill input[type="number"]::-webkit-inner-spin-button,
  .pill input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .pill input[type="text"] {
    width: 110px; border: none; background: transparent;
    font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); outline: none;
  }
  .pill span { font-size: 11px; font-family: var(--mono); color: var(--muted); }

  button {
    font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text);
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 14px; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  button:hover { background: var(--border); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 12px; height: 12px;
    border: 1.5px solid var(--border); border-top-color: var(--muted);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .spinner.active { display: inline-block; }

  .notice {
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px; margin-bottom: 1.25rem; line-height: 1.7;
  }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem;
  }
  @media (max-width: 500px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .metric-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-value { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; color: var(--text); }
  .metric-value.ahead { color: var(--green); }
  .metric-value.behind { color: var(--red); }
  .metric-sub { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

  .section-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  .days-table { width: 100%; margin-bottom: 0.5rem; }
  .day-row {
    display: grid; grid-template-columns: 90px 1fr 36px 52px;
    align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .day-row:last-child { border-bottom: none; }

  .day-name { font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .day-name.today { color: var(--text); font-weight: 500; }

  .bar-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.miss   { background: var(--red); }
  .bar-fill.nodata { background: var(--border); }

  .day-count { font-size: 13px; font-family: var(--mono); font-weight: 500; color: var(--text); text-align: right; }
  .day-count.nodata { color: var(--muted); }

  .day-delta { font-size: 11px; font-family: var(--mono); text-align: right; }
  .day-delta.pos  { color: var(--green); }
  .day-delta.neg  { color: var(--red); }
  .day-delta.zero { color: var(--muted); }

  .today-section { margin-top: 1.75rem; margin-bottom: 1.5rem; }
  .manga-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .manga-row:last-child { border-bottom: none; }
  .manga-title { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .manga-ch { font-size: 12px; font-family: var(--mono); color: var(--muted); flex-shrink: 0; }

  .status-msg { font-size: 13px; font-family: var(--mono); color: var(--muted); padding: 2rem 0; text-align: center; }
  .error-msg { font-size: 13px; font-family: var(--mono); color: var(--red); background: var(--red-bg); border-radius: 6px; padding: 12px 14px; margin-bottom: 1rem; line-height: 1.6; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>manga pace tracker</h1>
      <p id="last-updated">not yet loaded</p>
    </div>
    <div class="header-right">
      <div class="pill">
        <label for="clientid-input">client id</label>
        <input id="clientid-input" type="text" placeholder="MAL client id" autocomplete="off" spellcheck="false" style="width:130px">
      </div>
      <div class="pill">
        <label for="username-input">@</label>
        <input id="username-input" type="text" placeholder="mal username" autocomplete="off" spellcheck="false">
      </div>
      <div class="pill">
        <label for="goal-input">goal</label>
        <input id="goal-input" type="number" min="1" max="999" value="10">
        <span>ch/day</span>
      </div>
      <button id="refresh-btn">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">↻ refresh</span>
      </button>
    </div>
  </header>

  <div id="main-content">
    <p class="status-msg">enter your MAL username above to start</p>
  </div>

</div>

<script>
const LS_USERNAME  = 'mal_tracker_username';
const LS_GOAL      = 'mal_tracker_goal';
const LS_CLIENTID  = 'mal_tracker_clientid';
const LS_SNAP_PFX  = 'mal_snap_';
const LS_SNAP_TS_PFX = 'mal_snap_ts_';
const LS_TITLES    = 'mal_titles';
const LS_JIKAN_HISTORY = 'mal_jikan_history';
const LS_SCHEMA_VERSION = 'mal_schema_version';
const SCHEMA_VERSION       = '2';
const DEFAULT_GOAL         = 10;
const AUTO_REFRESH_MS      = 30 * 60 * 1000; // 30 minutes

let autoRefreshTimer = null;
let isRefreshing = false;

const MAL_API   = 'https://api.myanimelist.net/v2';
const JIKAN_API = 'https://api.jikan.moe/v4';
const CORS_PFX  = 'https://corsproxy.io/?url=';

const $ = id => document.getElementById(id);

function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateKey(daysAgo = 0) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return dateToKey(d);
}

function dayLabel(daysAgo) {
  if (daysAgo === 0) return 'today';
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

function loadSettings() {
  $('username-input').value  = localStorage.getItem(LS_USERNAME) || '';
  $('goal-input').value      = localStorage.getItem(LS_GOAL) || DEFAULT_GOAL;
  $('clientid-input').value  = localStorage.getItem(LS_CLIENTID) || '';
}

// One-time clean-up of caches written by older versions that misinterpreted
// Jikan's `increment` field (it's the chapter number, not a delta) and inflated
// per-day chapter counts. Drop stored snapshots, snapshot timestamps, and the
// Jikan history cache so the corrected logic rebuilds from scratch. User
// settings (username, client id, goal) are preserved.
function migrateIfNeeded() {
  if (localStorage.getItem(LS_SCHEMA_VERSION) === SCHEMA_VERSION) return;
  Object.keys(localStorage)
    .filter(k => k === LS_JIKAN_HISTORY
              || k.startsWith(LS_SNAP_PFX)
              || k.startsWith(LS_SNAP_TS_PFX))
    .forEach(k => localStorage.removeItem(k));
  localStorage.setItem(LS_SCHEMA_VERSION, SCHEMA_VERSION);
}

function saveSettings() {
  const u = $('username-input').value.trim();
  if (u) localStorage.setItem(LS_USERNAME, u);
  localStorage.setItem(LS_GOAL, $('goal-input').value || DEFAULT_GOAL);
  const c = $('clientid-input').value.trim();
  if (c) localStorage.setItem(LS_CLIENTID, c);
}

function getUsername() { return $('username-input').value.trim(); }
function getGoal()     { return parseInt($('goal-input').value) || DEFAULT_GOAL; }
function getClientId() { return $('clientid-input').value.trim(); }

function saveSnapshot(key, snap) { localStorage.setItem(LS_SNAP_PFX + key, JSON.stringify(snap)); }
function loadSnapshot(key)       { const r = localStorage.getItem(LS_SNAP_PFX + key); return r ? JSON.parse(r) : null; }
function loadTitles()            { const r = localStorage.getItem(LS_TITLES); return r ? JSON.parse(r) : {}; }
function saveTitles(t)           { localStorage.setItem(LS_TITLES, JSON.stringify({ ...loadTitles(), ...t })); }
function saveJikanByDay(byDay)   { localStorage.setItem(LS_JIKAN_HISTORY, JSON.stringify(byDay)); }
function loadJikanByDay()        { const r = localStorage.getItem(LS_JIKAN_HISTORY); return r ? JSON.parse(r) : {}; }

async function fetchMangaList(username, clientId) {
  let all = [];
  let url = `${MAL_API}/users/${username}/mangalist?limit=1000&fields=list_status`;
  while (url) {
    const res = await fetch(CORS_PFX + encodeURIComponent(url), {
      headers: { 'X-MAL-CLIENT-ID': clientId }
    });
    if (!res.ok) { const b = await res.json().catch(() => ({})); throw new Error(b.message || b.error || `HTTP ${res.status}`); }
    const json = await res.json();
    all.push(...(json.data || []));
    url = json.paging?.next || null;
    if (url) await new Promise(r => setTimeout(r, 500));
  }
  return all;
}

function buildSnapshot(data) {
  const snap = {}, titles = {};
  // Exclude manga with terminal statuses (completed / dropped) that haven't been
  // touched within the 8-day tracking window.  These entries never gain new chapters
  // and, if their stored num_chapters_read ever diverges from an older snapshot
  // (e.g. the user bulk-corrected chapter counts on MAL), the diff would falsely
  // credit thousands of chapters to "today".  Manga completed or dropped within the
  // last 8 days are still included so that the completion-day reading counts.
  const cutoff = Date.now() - 8 * 24 * 60 * 60 * 1000;
  data.forEach(item => {
    const status    = item.list_status?.status;
    const updatedAt = item.list_status?.updated_at
      ? new Date(item.list_status.updated_at).getTime() : Date.now();
    if ((status === 'completed' || status === 'dropped') && updatedAt < cutoff) return;
    const id   = String(item.node.id);
    snap[id]   = item.list_status?.num_chapters_read || 0;
    titles[id] = item.node.title;
  });
  return { snap, titles };
}

async function fetchJikanHistory(username) {
  try {
    const res = await fetch(`${JIKAN_API}/users/${encodeURIComponent(username)}/history?type=manga`);
    if (!res.ok) return [];
    const json = await res.json();
    return json.data || [];
  } catch (_) { return []; }
}

function groupHistoryByDay(historyData) {
  // Jikan's `increment` field is the chapter NUMBER recorded by each MAL
  // history entry (e.g. "Read chapter 47" -> increment=47), NOT a count of
  // chapters added. Summing the increments adds chapter numbers together
  // (1+2+3=6 instead of 3 chapters), which inflates daily totals into the
  // thousands. Each history entry represents one chapter read, so the daily
  // count for a manga is the number of entries on that day.
  const byDay = {}, titles = {};
  historyData.forEach(entry => {
    const day     = dateToKey(new Date(entry.date)); // local date 'YYYY-MM-DD'
    const mangaId = String(entry.entry.mal_id);
    if (!byDay[day]) byDay[day] = {};
    byDay[day][mangaId] = (byDay[day][mangaId] || 0) + 1;
    if (entry.entry.name) titles[mangaId] = entry.entry.name;
  });
  return { byDay, titles };
}

// Reconstruct past daily snapshots by working backwards from currentSnap,
// subtracting each day's increments. Only fills days that have no stored snapshot.
// Yesterday (i=1) is intentionally not saved here: the Jikan history API often has
// a propagation delay, so today's increments may be absent, which would cause a
// derived "yesterday" identical to today and produce a false 0 for today's count.
// Option 1 (below) handles yesterday only when Jikan actually has today's data.
function backfillSnapshots(currentSnap, historyByDay) {
  let rollingSnap = { ...currentSnap };
  for (let i = 1; i <= 6; i++) {
    const key      = dateKey(i);
    const existing = loadSnapshot(key);
    if (existing) {
      rollingSnap = existing;
      continue;
    }
    // Subtract increments from dateKey(i-1) to derive dateKey(i)
    const dayIncrements = historyByDay[dateKey(i - 1)] || {};
    const prevSnap = {};
    Object.keys(rollingSnap).forEach(id => {
      prevSnap[id] = Math.max(0, (rollingSnap[id] || 0) - (dayIncrements[id] || 0));
    });
    // Don't save yesterday here — let Option 1 handle it with its non-empty data guard.
    if (i > 1) saveSnapshot(key, prevSnap);
    rollingSnap = prevSnap;
  }
}

function computeDiff(snapA, snapB, titles) {
  if (!snapA || !snapB) return null;
  let total = 0;
  const byTitle = {};
  Object.keys(snapB).forEach(id => {
    const diff = (snapB[id] || 0) - (snapA[id] || 0);
    if (diff > 0) { total += diff; const t = titles[id] || `id:${id}`; byTitle[t] = (byTitle[t] || 0) + diff; }
  });
  return { total, byTitle };
}

function render() {
  const goal   = getGoal();
  const titles = loadTitles();

  const last7  = [];
  let cumDelta = 0;
  const jikanByDay = loadJikanByDay();
  for (let i = 6; i >= 0; i--) {
    let count = null, byTitle = {};

    if (i === 0) {
      // Today: snapshot diff gives the exact chapter delta and catches reads
      // that haven't propagated to Jikan yet, but it also reflects pure
      // metadata edits (e.g. user bulk-sets a manga's num_chapters_read or
      // changes status into "reading") which can falsely credit hundreds of
      // chapters to today. Use Jikan as an "actually-read" signal: per-manga
      // diff only counts when there's at least one Jikan history entry for
      // that manga today. If Jikan has no today data at all, fall back to the
      // raw snapshot diff so very recent reads aren't lost to propagation lag.
      const snapCurr   = loadSnapshot(dateKey(0));
      const snapPrev   = loadSnapshot(dateKey(1));
      const jikanToday = jikanByDay[dateKey(0)] || {};
      if (snapCurr && snapPrev) {
        if (Object.keys(jikanToday).length === 0) {
          const diff = computeDiff(snapPrev, snapCurr, titles);
          if (diff) { count = diff.total; byTitle = diff.byTitle; }
        } else {
          count = 0;
          Object.keys(jikanToday).forEach(id => {
            const d = (snapCurr[id] || 0) - (snapPrev[id] || 0);
            if (d > 0) {
              count += d;
              const t = titles[id] || `id:${id}`;
              byTitle[t] = (byTitle[t] || 0) + d;
            }
          });
        }
      }
    } else {
      // Past days: use Jikan history directly — it records the exact date each
      // chapter was read, so it correctly attributes chapters to the day they were
      // actually read rather than the day a snapshot was taken.
      const jikanDay = jikanByDay[dateKey(i)];
      if (jikanDay && Object.keys(jikanDay).length > 0) {
        count = 0;
        Object.entries(jikanDay).forEach(([id, ch]) => {
          if (ch > 0) {
            count += ch;
            const t = titles[id] || `id:${id}`;
            byTitle[t] = (byTitle[t] || 0) + ch;
          }
        });
      } else {
        // Fallback to snapshot diff when Jikan has no data for this day.
        const snapCurr = loadSnapshot(dateKey(i));
        const snapPrev = loadSnapshot(dateKey(i + 1));
        const diff     = computeDiff(snapPrev, snapCurr, titles);
        if (diff) { count = diff.total; byTitle = diff.byTitle; }
      }
    }
    if (count !== null) cumDelta += count - goal;
    last7.push({ label: dayLabel(i), isToday: i === 0, count, cumDelta: count !== null ? cumDelta : null, byTitle });
  }

  const known     = last7.filter(d => d.count !== null);
  const weekTotal = known.reduce((s, d) => s + d.count, 0);
  const weekDelta = weekTotal - goal * known.length;
  const todayEntry = last7[last7.length - 1];
  const dailyAvg  = known.length > 0 ? Math.round((weekTotal / known.length) * 10) / 10 : 0;
  const maxBar    = Math.max(goal * 1.5, ...last7.map(d => d.count ?? 0), 1);
  const noData    = last7.filter(d => d.count === null).length;

  const todayTitlesSorted = Object.entries(todayEntry.byTitle).sort((a, b) => b[1] - a[1]);

  $('main-content').innerHTML = `
    ${noData > 0 ? `<div class="notice">ℹ no data for ${noData} day${noData > 1 ? 's' : ''} yet — the tracker diffs snapshots taken on each visit, so history builds up over time. Hit refresh once a day to keep it accurate.</div>` : ''}

    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">today</div>
        <div class="metric-value ${isRefreshing ? '' : todayEntry.count === null ? '' : todayEntry.count >= goal ? 'ahead' : 'behind'}">${isRefreshing ? '···' : todayEntry.count ?? '—'}</div>
        <div class="metric-sub">of ${goal} ch</div>
      </div>
      <div class="metric">
        <div class="metric-label">${known.length}d total</div>
        <div class="metric-value">${weekTotal}</div>
        <div class="metric-sub">of ${goal * known.length} ch</div>
      </div>
      <div class="metric">
        <div class="metric-label">pace</div>
        <div class="metric-value ${weekDelta >= 0 ? 'ahead' : 'behind'}">${known.length > 0 ? (weekDelta >= 0 ? '+' : '') + weekDelta : '—'}</div>
        <div class="metric-sub">${known.length > 0 ? (weekDelta >= 0 ? 'ahead' : 'behind') : 'no data yet'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">avg/day</div>
        <div class="metric-value">${known.length > 0 ? dailyAvg : '—'}</div>
        <div class="metric-sub">ch/day</div>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:10px">last 7 days — right column = cumulative delta vs goal</div>
    <div class="days-table">
      ${last7.map(d => {
        const hasData  = d.count !== null;
        const barPct   = hasData ? Math.min(100, (d.count / maxBar) * 100).toFixed(1) : 0;
        const barClass = !hasData ? 'nodata' : d.count < goal ? 'miss' : '';
        return `
          <div class="day-row">
            <span class="day-name ${d.isToday ? 'today' : ''}">${d.label}</span>
            <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${barPct}%"></div></div>
            <span class="day-count ${!hasData ? 'nodata' : ''}">${hasData ? d.count : '·'}</span>
            <span class="day-delta ${d.cumDelta === null ? 'zero' : d.cumDelta > 0 ? 'pos' : d.cumDelta < 0 ? 'neg' : 'zero'}">
              ${d.cumDelta === null ? '·' : (d.cumDelta > 0 ? '+' : '') + d.cumDelta}
            </span>
          </div>`;
      }).join('')}
    </div>

    ${todayTitlesSorted.length > 0 ? `
      <div class="today-section">
        <div class="section-label">today's reading</div>
        ${todayTitlesSorted.map(([title, count]) => `
          <div class="manga-row">
            <span class="manga-title">${title}</span>
            <span class="manga-ch">${count} ch</span>
          </div>`).join('')}
      </div>` : ''}
  `;
}

async function refresh() {
  const username = getUsername();
  const clientId = getClientId();
  if (!username) { $('main-content').innerHTML = `<p class="status-msg">enter your MAL username above to start</p>`; return; }
  if (!clientId) {
    $('main-content').innerHTML = `<div class="error-msg">⚠ MAL client ID required — <a href="https://myanimelist.net/apiconfig" target="_blank" style="color:inherit">register a free app at myanimelist.net/apiconfig</a> to get one, then paste it in the <strong>client id</strong> field above.</div>`;
    $('last-updated').textContent = `@${username} · no client id`;
    return;
  }
  if (!/^[a-f0-9]{32}$/i.test(clientId)) {
    $('main-content').innerHTML = `<div class="error-msg">⚠ Invalid MAL client ID — it should be a 32-character alphanumeric string from <a href="https://myanimelist.net/apiconfig" target="_blank" style="color:inherit">myanimelist.net/apiconfig</a>.</div>`;
    $('last-updated').textContent = `@${username} · invalid client id`;
    return;
  }

  const btn = $('refresh-btn'), spinner = $('spinner'), label = $('btn-label');
  btn.disabled = true; spinner.classList.add('active'); label.textContent = 'loading…';
  $('last-updated').textContent = `@${username} · fetching…`;
  isRefreshing = true;
  render();

  try {
    // Option 2: if we have a today-snapshot from exactly yesterday but no yesterday
    // snapshot, promote it before overwriting. Guard with the saved timestamp so that
    // a snapshot from two or more days ago is NOT promoted — that would cause all
    // missed-day chapters to be lumped into today's count.
    const prevTodaySnap = loadSnapshot(dateKey(0));
    const prevTodayTsRaw = localStorage.getItem(LS_SNAP_TS_PFX + dateKey(0));
    if (prevTodaySnap && !loadSnapshot(dateKey(1)) && prevTodayTsRaw) {
      const savedKey = dateToKey(new Date(parseInt(prevTodayTsRaw, 10)));
      if (savedKey === dateKey(1)) {
        saveSnapshot(dateKey(1), prevTodaySnap);
      }
    }

    const data             = await fetchMangaList(username, clientId);
    const { snap, titles } = buildSnapshot(data);
    saveSnapshot(dateKey(0), snap);
    localStorage.setItem(LS_SNAP_TS_PFX + dateKey(0), Date.now()); // Unix epoch ms
    saveTitles(titles);

    const historyData                    = await fetchJikanHistory(username);
    const { byDay, titles: jikanTitles } = groupHistoryByDay(historyData);
    saveJikanByDay(byDay);
    saveTitles(jikanTitles);
    backfillSnapshots(snap, byDay);

    // Option 4: if yesterday's snapshot exists but was saved before the user finished
    // reading (e.g. saved by the 30-min auto-refresh early in the day), apply any
    // Jikan history entries for yesterday that were recorded *after* the snapshot
    // timestamp.  Each increment is capped at today's count to avoid over-counting.
    const yesterdaySnap = loadSnapshot(dateKey(1));
    const yesterdayTsRaw = localStorage.getItem(LS_SNAP_TS_PFX + dateKey(1));
    if (yesterdaySnap && yesterdayTsRaw) {
      const savedAt = parseInt(yesterdayTsRaw, 10);
      const corrected = { ...yesterdaySnap };
      let changed = false;
      historyData.forEach(entry => {
        if (dateToKey(new Date(entry.date)) !== dateKey(1)) return;
        if (new Date(entry.date).getTime() <= savedAt) return;
        const id = String(entry.entry.mal_id);
        // Each Jikan entry represents one chapter read (the entry's
        // `increment` is the chapter number, not a delta), so bump
        // yesterday's recorded count by 1 per entry, capped at today's.
        const capped = Math.min(snap[id] || 0, (corrected[id] || 0) + 1);
        if (capped !== corrected[id]) { corrected[id] = capped; changed = true; }
      });
      if (changed) {
        saveSnapshot(dateKey(1), corrected);
        localStorage.setItem(LS_SNAP_TS_PFX + dateKey(1), Date.now());
      }
    }

    isRefreshing = false;
    render();
    $('last-updated').textContent = `@${username} · updated ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

    // Option 3: auto-refresh every 30 minutes to keep today's data current.
    clearTimeout(autoRefreshTimer);
    autoRefreshTimer = setTimeout(() => refresh(), AUTO_REFRESH_MS);
  } catch(e) {
    isRefreshing = false;
    $('main-content').innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
    $('last-updated').textContent = `@${username} · error`;
  } finally {
    btn.disabled = false; spinner.classList.remove('active'); label.textContent = '↻ refresh';
  }
}

$('goal-input').addEventListener('input', () => { saveSettings(); render(); });

$('clientid-input').addEventListener('input', () => { saveSettings(); });

let usernameTimer;
$('username-input').addEventListener('input', () => {
  saveSettings();
  clearTimeout(usernameTimer);
  usernameTimer = setTimeout(() => refresh(), 800);
});

$('refresh-btn').addEventListener('click', refresh);

migrateIfNeeded();
loadSettings();
if (getUsername()) { render(); refresh(); }
</script>
</body>
</html>
