<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAL Manga Pace Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1916;
    --muted: #7a786f;
    --green: #1a7a52;
    --green-bg: #e8f5ef;
    --red: #b84a2a;
    --red-bg: #faeae5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f;
      --surface: #1f1e17;
      --border: #2e2d25;
      --text: #f0ede6;
      --muted: #7a786f;
      --green: #4bc98a;
      --green-bg: #0d2e1e;
      --red: #e8725a;
      --red-bg: #2a150d;
    }
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
    padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }

  .header-left h1 { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 3px; }
  .header-left p { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
  }
  .pill label { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .pill input[type="number"] {
    width: 48px; border: none; background: transparent;
    font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text);
    text-align: center; outline: none; -moz-appearance: textfield;
  }
  .pill input[type="number"]::-webkit-inner-spin-button,
  .pill input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .pill input[type="text"] {
    width: 110px; border: none; background: transparent;
    font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); outline: none;
  }
  .pill span { font-size: 11px; font-family: var(--mono); color: var(--muted); }

  button {
    font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text);
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 14px; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  button:hover { background: var(--border); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 12px; height: 12px;
    border: 1.5px solid var(--border); border-top-color: var(--muted);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .spinner.active { display: inline-block; }

  .notice {
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px; margin-bottom: 1.25rem; line-height: 1.7;
  }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem;
  }
  @media (max-width: 500px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .metric-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-value { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; color: var(--text); }
  .metric-value.ahead { color: var(--green); }
  .metric-value.behind { color: var(--red); }
  .metric-sub { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

  .section-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  .days-table { width: 100%; margin-bottom: 0.5rem; }
  .day-row {
    display: grid; grid-template-columns: 90px 1fr 36px 52px;
    align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .day-row:last-child { border-bottom: none; }

  .day-name { font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .day-name.today { color: var(--text); font-weight: 500; }

  .bar-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.miss   { background: var(--red); }
  .bar-fill.nodata { background: var(--border); }

  .day-count { font-size: 13px; font-family: var(--mono); font-weight: 500; color: var(--text); text-align: right; }
  .day-count.nodata { color: var(--muted); }

  .day-delta { font-size: 11px; font-family: var(--mono); text-align: right; }
  .day-delta.pos  { color: var(--green); }
  .day-delta.neg  { color: var(--red); }
  .day-delta.zero { color: var(--muted); }

  .today-section { margin-top: 1.75rem; margin-bottom: 1.5rem; }
  .manga-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .manga-row:last-child { border-bottom: none; }
  .manga-title { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .manga-ch { font-size: 12px; font-family: var(--mono); color: var(--muted); flex-shrink: 0; }

  .status-msg { font-size: 13px; font-family: var(--mono); color: var(--muted); padding: 2rem 0; text-align: center; }
  .error-msg { font-size: 13px; font-family: var(--mono); color: var(--red); background: var(--red-bg); border-radius: 6px; padding: 12px 14px; margin-bottom: 1rem; line-height: 1.6; }

  .anchor-info {
    font-size: 11px; font-family: var(--mono); color: var(--muted);
    margin: -0.5rem 0 1.25rem 0; text-align: center; line-height: 1.6;
  }
  .anchor-info button {
    background: none; border: none; color: var(--muted);
    text-decoration: underline; cursor: pointer; padding: 0;
    font-family: inherit; font-size: inherit;
  }
  .anchor-info button:hover { color: var(--text); }

  .build-info {
    font-size: 10px; font-family: var(--mono); color: var(--muted);
    text-align: center; margin-top: 2rem; padding-top: 1rem;
    border-top: 1px solid var(--border); opacity: 0.6;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>manga pace tracker</h1>
      <p id="last-updated">not yet loaded</p>
    </div>
    <div class="header-right">
      <div class="pill">
        <label for="clientid-input">client id</label>
        <input id="clientid-input" type="text" placeholder="MAL client id" autocomplete="off" spellcheck="false" style="width:130px">
      </div>
      <div class="pill">
        <label for="username-input">@</label>
        <input id="username-input" type="text" placeholder="mal username" autocomplete="off" spellcheck="false">
      </div>
      <div class="pill">
        <label for="goal-input">goal</label>
        <input id="goal-input" type="number" min="1" max="999" value="10">
        <span>ch/day</span>
      </div>
      <div class="pill">
        <label for="offset-input">offset</label>
        <input id="offset-input" type="number" value="0" step="1">
        <span>ch</span>
      </div>
      <button id="refresh-btn">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">↻ refresh</span>
      </button>
    </div>
  </header>

  <div id="main-content">
    <p class="status-msg">enter your MAL username above to start</p>
  </div>

  <footer class="build-info" id="build-info">build __BUILD_ID__</footer>
</div>

<script>
const LS_USERNAME       = 'mal_tracker_username';
const LS_GOAL           = 'mal_tracker_goal';
const LS_OFFSET         = 'mal_tracker_offset';
const LS_CLIENTID       = 'mal_tracker_clientid';
const LS_ANCHOR_DATE    = 'mal_anchor_date';
const LS_ANCHOR_TOTAL   = 'mal_anchor_total';
const LS_SCHEMA_VERSION = 'mal_schema_version';
const SCHEMA_VERSION = '3';
const DEFAULT_GOAL = 10;
const AUTO_REFRESH_MS = 30 * 60 * 1000; // 30 minutes

let autoRefreshTimer = null;
let isRefreshing     = false;
// In-memory cache of the latest API responses, so re-renders triggered by
// goal changes don't have to refetch. Cleared on page reload by design —
// every fresh session starts with a fresh API pull.
let latestMangaList    = null;
let latestHistory      = null;
let latestHistoryError = null;

const MAL_API   = 'https://api.myanimelist.net/v2';
const JIKAN_API = 'https://api.jikan.moe/v4';
const CORS_PFX  = 'https://corsproxy.io/?url=';

const $ = id => document.getElementById(id);

function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateKey(daysAgo = 0) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return dateToKey(d);
}

function dayLabel(daysAgo) {
  if (daysAgo === 0) return 'today';
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

function loadSettings() {
  $('username-input').value  = localStorage.getItem(LS_USERNAME) || '';
  $('goal-input').value      = localStorage.getItem(LS_GOAL) || DEFAULT_GOAL;
  $('offset-input').value    = localStorage.getItem(LS_OFFSET) || 0;
  $('clientid-input').value  = localStorage.getItem(LS_CLIENTID) || '';
}

// The app is now stateless apart from user settings — every refresh recomputes
// the 7-day view from a fresh MAL + Jikan pull. Clean up keys left over from
// older versions that stored per-day snapshots, snapshot timestamps, titles,
// and Jikan history caches.
function migrateIfNeeded() {
  if (localStorage.getItem(LS_SCHEMA_VERSION) === SCHEMA_VERSION) return;
  const keep = new Set([LS_USERNAME, LS_GOAL, LS_OFFSET, LS_CLIENTID, LS_ANCHOR_DATE, LS_ANCHOR_TOTAL, LS_SCHEMA_VERSION]);
  Object.keys(localStorage).forEach(k => { if (!keep.has(k)) localStorage.removeItem(k); });
  localStorage.setItem(LS_SCHEMA_VERSION, SCHEMA_VERSION);
}

function getAnchor() {
  const date = localStorage.getItem(LS_ANCHOR_DATE);
  const totalStr = localStorage.getItem(LS_ANCHOR_TOTAL);
  if (!date || totalStr === null) return null;
  const total = parseInt(totalStr, 10);
  if (!Number.isFinite(total)) return null;
  return { date, total };
}
function setAnchor(date, total) {
  localStorage.setItem(LS_ANCHOR_DATE, date);
  localStorage.setItem(LS_ANCHOR_TOTAL, String(total));
}
function clearAnchor() {
  localStorage.removeItem(LS_ANCHOR_DATE);
  localStorage.removeItem(LS_ANCHOR_TOTAL);
}
// Calendar-day difference between two YYYY-MM-DD strings (interpreted as
// local midnight). Negative if `to` precedes `from`.
function daysBetween(fromStr, toStr) {
  const a = new Date(fromStr + 'T00:00:00').getTime();
  const b = new Date(toStr   + 'T00:00:00').getTime();
  return Math.round((b - a) / 86400000);
}

function saveSettings() {
  const u = $('username-input').value.trim();
  if (u) localStorage.setItem(LS_USERNAME, u);
  localStorage.setItem(LS_GOAL, $('goal-input').value || DEFAULT_GOAL);
  localStorage.setItem(LS_OFFSET, $('offset-input').value || 0);
  const c = $('clientid-input').value.trim();
  if (c) localStorage.setItem(LS_CLIENTID, c);
}

function getUsername() { return $('username-input').value.trim(); }
function getGoal()     { return parseInt($('goal-input').value) || DEFAULT_GOAL; }
function getOffset()   { const v = parseInt($('offset-input').value, 10); return Number.isFinite(v) ? v : 0; }
function getClientId() { return $('clientid-input').value.trim(); }

async function fetchMangaList(username, clientId) {
  let all = [];
  // Explicit `updated_at` sub-field, and a cache-bust query param so the
  // CORS proxy can't hand us a stale response when the user just bumped
  // a chapter on MAL seconds ago.
  let url = `${MAL_API}/users/${username}/mangalist?limit=1000&fields=list_status{status,num_chapters_read,updated_at}&_=${Date.now()}`;
  while (url) {
    const res = await fetch(CORS_PFX + encodeURIComponent(url), {
      headers: { 'X-MAL-CLIENT-ID': clientId },
      cache: 'no-store',
    });
    if (!res.ok) { const b = await res.json().catch(() => ({})); throw new Error(b.message || b.error || `HTTP ${res.status}`); }
    const json = await res.json();
    all.push(...(json.data || []));
    url = json.paging?.next || null;
    if (url) await new Promise(r => setTimeout(r, 500));
  }
  return all;
}

async function fetchJikanHistory(username) {
  // MAL's official API doesn't expose per-day reading history, so we go
  // through Jikan (jikan.moe) which scrapes MAL's public history page.
  // Surface failures instead of swallowing them — when this returns no
  // data the entire past-7-days panel sits empty.
  try {
    const res = await fetch(`${JIKAN_API}/users/${encodeURIComponent(username)}/history?type=manga&_=${Date.now()}`, {
      cache: 'no-store',
    });
    if (!res.ok) return { data: [], error: `Jikan HTTP ${res.status}` };
    const json = await res.json();
    return { data: json.data || [], error: null };
  } catch (e) {
    return { data: [], error: `Jikan request failed: ${e.message || e}` };
  }
}

// Derive everything the renderer needs from the latest API responses.
//
//   snapCurr[id]       = MAL's current num_chapters_read for an active manga
//   updatedToday       = set of manga ids whose list_status.updated_at falls
//                        on the user's local "today"
//   byDay[day][id]     = number of Jikan history entries for that manga on
//                        that day (one entry = one chapter; the increment
//                        field is the chapter NUMBER, not a delta)
//   maxBeforeToday[id] = highest Jikan increment for that manga strictly
//                        before today — used as a real-time "what chapter
//                        was the user on at the start of today" reference
//   titles[id]         = display title (from MAL, falls back to Jikan)
function buildState(mangaList, history) {
  const todayKey     = dateKey(0);
  const todayStartMs = new Date().setHours(0, 0, 0, 0);
  const titles = {}, snapCurr = {}, byDay = {}, maxBeforeToday = {};
  const updatedToday = new Set();
  // Lifetime total across the whole library (every status). Used as the
  // anchor baseline so chapter counts don't disappear when a manga later
  // gets marked completed or dropped.
  let totalChapters = 0;

  // For per-day tracking, drop terminal statuses (completed / dropped) older
  // than 8 days — those can't contribute new reads and risk noise from any
  // chapter-count edits. Anything finished within the window still counts.
  const cutoff = Date.now() - 8 * 24 * 60 * 60 * 1000;
  mangaList.forEach(item => {
    const ls = item.list_status || {};
    totalChapters += ls.num_chapters_read || 0;
    const status      = ls.status;
    const updatedAtMs = ls.updated_at ? new Date(ls.updated_at).getTime() : Date.now();
    if ((status === 'completed' || status === 'dropped') && updatedAtMs < cutoff) return;
    const id = String(item.node.id);
    snapCurr[id] = ls.num_chapters_read || 0;
    if (updatedAtMs >= todayStartMs) updatedToday.add(id);
    if (item.node.title) titles[id] = item.node.title;
  });

  history.forEach(entry => {
    const day = dateToKey(new Date(entry.date)); // local date
    const id  = String(entry.entry.mal_id);
    const ch  = entry.increment || 0;
    if (entry.entry.name) titles[id] = titles[id] || entry.entry.name;
    if (!byDay[day]) byDay[day] = {};
    byDay[day][id] = (byDay[day][id] || 0) + 1;
    if (day < todayKey) {
      maxBeforeToday[id] = Math.max(maxBeforeToday[id] || 0, ch);
    }
  });

  return { snapCurr, updatedToday, byDay, maxBeforeToday, titles, totalChapters };
}

function render() {
  const goal = getGoal();
  if (!latestMangaList || !latestHistory) {
    // Nothing fetched yet this session; refresh() will rerender once API calls land.
    $('main-content').innerHTML = isRefreshing
      ? `<p class="status-msg">fetching…</p>`
      : `<p class="status-msg">hit refresh to load your reading data</p>`;
    return;
  }
  const { snapCurr, updatedToday, byDay, maxBeforeToday, titles, totalChapters } = buildState(latestMangaList, latestHistory);

  // First pass: compute each day's count/byTitle. We assign cumDelta in a
  // second pass once we know whether to anchor the running total to the
  // lifetime baseline (so the rightmost cumDelta lines up with the pace
  // metric) or fall back to just the offset.
  const offset = getOffset();
  const anchor = getAnchor();
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const dKey = dateKey(i);
    let count = null, byTitle = {};

    if (i === 0) {
      // Today's chapters per manga = the strongest signal we have:
      //   1. MAL snapCurr minus Jikan's max chapter before today
      //      (exact when both sources are up to date).
      //   2. Number of Jikan entries today for that manga.
      //   3. updated_at says it was touched today -> at least 1.
      // We take the MAX across tiers rather than short-circuiting on the
      // first one: if MAL is stale (CORS-proxy cache, sub-second reads)
      // or Jikan's window already contains today's read, tier 1 yields 0
      // even though tier 3 knows the user touched it. Max also keeps
      // bulk reads (multiple chapters of one manga) correct because
      // tier 1 still produces the true delta.
      count = 0;
      const jikanToday = byDay[dKey] || {};
      Object.keys(snapCurr).forEach(id => {
        let d = 0;
        if (id in maxBeforeToday) {
          d = Math.max(d, (snapCurr[id] || 0) - maxBeforeToday[id]);
        }
        if (id in jikanToday) {
          d = Math.max(d, jikanToday[id]);
        }
        if (updatedToday.has(id) && (snapCurr[id] || 0) > 0) {
          d = Math.max(d, 1);
        }
        if (d > 0) {
          count += d;
          const t = titles[id] || `id:${id}`;
          byTitle[t] = (byTitle[t] || 0) + d;
        }
      });
    } else {
      // Past day: Jikan logs the exact date each chapter was read.
      const jikanDay = byDay[dKey];
      if (jikanDay && Object.keys(jikanDay).length > 0) {
        count = 0;
        Object.entries(jikanDay).forEach(([id, ch]) => {
          if (ch > 0) {
            count += ch;
            const t = titles[id] || `id:${id}`;
            byTitle[t] = (byTitle[t] || 0) + ch;
          }
        });
      }
    }
    last7.push({ label: dayLabel(i), isToday: i === 0, count, byTitle });
  }

  const known     = last7.filter(d => d.count !== null);
  const weekTotal = known.reduce((s, d) => s + d.count, 0);
  const weekDelta = weekTotal - goal * known.length;
  // paceDelta is "how many chapters ahead/behind goal you are, total":
  //   - with an anchor: lifetime, since the anchor was set
  //   - without:        the last-7-days delta + offset
  let paceDelta, daysSinceAnchor = null;
  if (anchor) {
    daysSinceAnchor = Math.max(0, daysBetween(anchor.date, dateKey(0)));
    paceDelta = (totalChapters - anchor.total) - goal * daysSinceAnchor + offset;
  } else {
    paceDelta = weekDelta + offset;
  }

  // Second pass: align the cumulative-delta column so its rightmost cell
  // equals paceDelta. We seed cumDelta with (paceDelta - weekDelta), so
  // adding each day's (count - goal) lands at paceDelta on the last known
  // day.
  let cumDelta = paceDelta - weekDelta;
  last7.forEach(d => {
    if (d.count !== null) {
      cumDelta += d.count - goal;
      d.cumDelta = cumDelta;
    } else {
      d.cumDelta = null;
    }
  });
  const todayEntry = last7[last7.length - 1];
  const dailyAvg  = known.length > 0 ? Math.round((weekTotal / known.length) * 10) / 10 : 0;
  const maxBar    = Math.max(goal * 1.5, ...last7.map(d => d.count ?? 0), 1);
  const noData    = last7.filter(d => d.count === null).length;

  const todayTitlesSorted = Object.entries(todayEntry.byTitle).sort((a, b) => b[1] - a[1]);

  $('main-content').innerHTML = `
    ${latestHistoryError
      ? `<div class="error-msg">⚠ couldn't load reading history from Jikan (${latestHistoryError}). MAL's official API doesn't expose per-day history, so the 7-day chart depends on Jikan (jikan.moe). Hit refresh to try again.</div>`
      : (latestHistory && latestHistory.length === 0
          ? `<div class="notice">ℹ Jikan returned no reading history for this account. MAL doesn't expose per-day history through its official API, so the 7-day chart relies on Jikan's scrape of your MAL history page. If you've definitely been reading, it might be a temporary Jikan cache miss — hit refresh in a moment.</div>`
          : (noData > 0
              ? `<div class="notice">ℹ no data for ${noData} day${noData > 1 ? 's' : ''} — Jikan only exposes a rolling history window, so older days outside that window stay blank.</div>`
              : ''))}

    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">today</div>
        <div class="metric-value ${isRefreshing ? '' : todayEntry.count === null ? '' : todayEntry.count >= goal ? 'ahead' : 'behind'}">${isRefreshing ? '···' : todayEntry.count ?? '—'}</div>
        <div class="metric-sub">of ${goal} ch</div>
      </div>
      <div class="metric">
        <div class="metric-label">${known.length}d total</div>
        <div class="metric-value">${weekTotal}</div>
        <div class="metric-sub">of ${goal * known.length} ch</div>
      </div>
      <div class="metric">
        <div class="metric-label">pace</div>
        <div class="metric-value ${paceDelta >= 0 ? 'ahead' : 'behind'}">${paceDelta >= 0 ? '+' : ''}${paceDelta}</div>
        <div class="metric-sub">${paceDelta >= 0 ? 'ahead' : 'behind'}${offset !== 0 ? ` · offset ${offset >= 0 ? '+' : ''}${offset}` : ''}</div>
      </div>
      <div class="metric">
        <div class="metric-label">avg/day</div>
        <div class="metric-value">${known.length > 0 ? dailyAvg : '—'}</div>
        <div class="metric-sub">ch/day</div>
      </div>
    </div>

    ${anchor ? `<div class="anchor-info">anchor ${anchor.date} (day ${daysSinceAnchor}) · baseline ${anchor.total} ch · lifetime ${totalChapters - anchor.total >= 0 ? '+' : ''}${totalChapters - anchor.total} ch · <button id="reset-anchor-btn">reset</button></div>` : ''}

    <div class="section-label" style="margin-bottom:10px">last 7 days — right column = cumulative delta vs goal</div>
    <div class="days-table">
      ${last7.map(d => {
        const hasData  = d.count !== null;
        const barPct   = hasData ? Math.min(100, (d.count / maxBar) * 100).toFixed(1) : 0;
        const barClass = !hasData ? 'nodata' : d.count < goal ? 'miss' : '';
        return `
          <div class="day-row">
            <span class="day-name ${d.isToday ? 'today' : ''}">${d.label}</span>
            <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${barPct}%"></div></div>
            <span class="day-count ${!hasData ? 'nodata' : ''}">${hasData ? d.count : '·'}</span>
            <span class="day-delta ${d.cumDelta === null ? 'zero' : d.cumDelta > 0 ? 'pos' : d.cumDelta < 0 ? 'neg' : 'zero'}">
              ${d.cumDelta === null ? '·' : (d.cumDelta > 0 ? '+' : '') + d.cumDelta}
            </span>
          </div>`;
      }).join('')}
    </div>

    ${todayTitlesSorted.length > 0 ? `
      <div class="today-section">
        <div class="section-label">today's reading</div>
        ${todayTitlesSorted.map(([title, count]) => `
          <div class="manga-row">
            <span class="manga-title">${title}</span>
            <span class="manga-ch">${count} ch</span>
          </div>`).join('')}
      </div>` : ''}
  `;

  const resetBtn = $('reset-anchor-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      const today = dateKey(0);
      setAnchor(today, totalChapters);
      render();
    });
  }
}

async function refresh() {
  const username = getUsername();
  const clientId = getClientId();
  if (!username) { $('main-content').innerHTML = `<p class="status-msg">enter your MAL username above to start</p>`; return; }
  if (!clientId) {
    $('main-content').innerHTML = `<div class="error-msg">⚠ MAL client ID required — <a href="https://myanimelist.net/apiconfig" target="_blank" style="color:inherit">register a free app at myanimelist.net/apiconfig</a> to get one, then paste it in the <strong>client id</strong> field above.</div>`;
    $('last-updated').textContent = `@${username} · no client id`;
    return;
  }
  if (!/^[a-f0-9]{32}$/i.test(clientId)) {
    $('main-content').innerHTML = `<div class="error-msg">⚠ Invalid MAL client ID — it should be a 32-character alphanumeric string from <a href="https://myanimelist.net/apiconfig" target="_blank" style="color:inherit">myanimelist.net/apiconfig</a>.</div>`;
    $('last-updated').textContent = `@${username} · invalid client id`;
    return;
  }

  const btn = $('refresh-btn'), spinner = $('spinner'), label = $('btn-label');
  btn.disabled = true; spinner.classList.add('active'); label.textContent = 'loading…';
  $('last-updated').textContent = `@${username} · fetching…`;
  isRefreshing = true;
  render();

  try {
    const [mangaList, historyResult] = await Promise.all([
      fetchMangaList(username, clientId),
      fetchJikanHistory(username),
    ]);
    latestMangaList    = mangaList;
    latestHistory      = historyResult.data;
    latestHistoryError = historyResult.error;

    // First refresh ever (or after a manual reset): anchor today's lifetime
    // total so pace is measured against this moment going forward.
    if (!getAnchor()) {
      const totalChapters = mangaList.reduce((s, item) => s + (item.list_status?.num_chapters_read || 0), 0);
      setAnchor(dateKey(0), totalChapters);
    }

    isRefreshing = false;
    render();
    $('last-updated').textContent = `@${username} · updated ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

    // Auto-refresh every 30 minutes to keep today's data current.
    clearTimeout(autoRefreshTimer);
    autoRefreshTimer = setTimeout(() => refresh(), AUTO_REFRESH_MS);
  } catch(e) {
    isRefreshing = false;
    $('main-content').innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
    $('last-updated').textContent = `@${username} · error`;
  } finally {
    btn.disabled = false; spinner.classList.remove('active'); label.textContent = '↻ refresh';
  }
}

$('goal-input').addEventListener('input', () => { saveSettings(); render(); });

$('offset-input').addEventListener('input', () => { saveSettings(); render(); });

$('clientid-input').addEventListener('input', () => { saveSettings(); });

let usernameTimer;
$('username-input').addEventListener('input', () => {
  saveSettings();
  clearTimeout(usernameTimer);
  usernameTimer = setTimeout(() => refresh(), 800);
});

$('refresh-btn').addEventListener('click', refresh);

// Hide the build footer when it still carries the literal placeholder
// (e.g. file:// previews or the raw repo HTML), so only the deployed
// site shows a real build ID injected by the GitHub Actions workflow.
const buildEl = $('build-info');
if (buildEl && buildEl.textContent.includes('__BUILD_ID__')) buildEl.style.display = 'none';

migrateIfNeeded();
loadSettings();
if (getUsername()) refresh();
</script>
</body>
